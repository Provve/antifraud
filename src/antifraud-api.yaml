openapi: "3.1.0"
info:
  title: Antifraud API
  version: "0.0.1"
servers:
  - url: http://localhost

paths:
  /observation:
    get:
      summary: Начать наблюдение
      parameters:
        - name: continue
          in: path
          required: true
          schema:
            type: boolean
          description: Можно ли начинать наблюдение?
        - name: nonce
          in: path
          required: true
          schema:
            type: string
          description: Случайное значение для алгоритма проверки легитимности Антифрода.
      responses:
        '200':
          description: ''
    head:
      summary: Дать команду "загрузить наблюдение".
      responses:
        '200':
          description: ''

components:
  schemas:
    ObservationUpload:
      allOf:
        - $ref: "#/components/schemas/Observation"
        - type: object
          properties:
            nonce:
              type: string
            sig:
              $ref: "#/components/schemas/Signature"
    Signature:
      type: string
      description: Подпись легитимности, формат Base64
    Observation:
      type: object
      properties:
        cheated:
          type: boolean
          description: Мухлевал ли экзаменуемый при прохождении экзамена?
        details:
          type: string
          description: Указание нарушений