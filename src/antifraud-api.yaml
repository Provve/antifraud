openapi: "3.1.0"
info:
  title: Antifraud API
  version: "0.0.1"
servers:
  - url: http://localhost

paths:
  /observation:
    post:
      summary: Начать наблюдение
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: boolean
              description: Можно ли начинать наблюдение?
      responses:
        '200':
          description: ''
    get:
      summary: Дать команду "загрузить наблюдение".
      responses:
        '200':
          description: ''

components:
  schemas:
    ObservationUpload:
      allOf:
        - $ref: "#/components/schemas/Observation"
        - type: object
          properties:
            sig:
              type: string
              description: Подпись легитимности
            checksum:
              $ref: "#/components/schemas/Checksum"
    Checksum:
      type: object
      properties:
        checksum:
          type: string
          description: Контрольная сумма бинаря Антифрода
        sig:
          type: string
          description: Подпись легитимности
    Observation:
      type: object
      properties:
        cheated:
          type: boolean
          description: Мухлевал ли экзаменуемый при прохождении экзамена?
        details:
          type: string
          description: Указание нарушений