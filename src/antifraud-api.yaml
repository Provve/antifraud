openapi: "3.1.0"
info:
  title: Antifraud API
  version: "0.0.1"
servers:
  - url: http://localhost

paths:
  /observation:
    get:
      summary: Начать наблюдение
      parameters:
        - name: nonce
          in: path
          required: true
          schema:
            type: string
          description: Случайное значение для алгоритма проверки легитимности Антифрода.
      responses:
        '200':
          description: ''
    head:
      summary: Дать команду "загрузить наблюдение".
      responses:
        '200':
          description: ''

components:
  schemas:
    ObservationUpload.request:
      type: object
      properties:
        observation:
          $ref: "#/components/schemas/Observation"
        nonce:
          type: string
        sig:
          $ref: "#/components/schemas/Signature"
    Signature:
      type: string
      description: Подпись легитимности (Base64). Формируется из Observation + nonce
    Observation:
      type: object
      properties:
        cheated:
          type: boolean
          description: Мухлевал ли экзаменуемый при прохождении экзамена?
        details:
          type: string
          description: Указание нарушений
    ObservationUpload.response:
      type: object
      properties:
        upload_redirect:
          type: string
          description: Ссылка на страницу загрузки решения
        trust_token:
          type: string